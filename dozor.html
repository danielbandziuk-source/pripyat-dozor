<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Припятский Дозор | OS V4.1</title>
    <style>
        :root { --neon: #7cfc00; --glass: rgba(10, 20, 10, 0.85); --bg: #050705; --accent: #2e7d32; }
        
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Segoe UI', Consolas, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }

        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(rgba(124, 252, 0, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(124, 252, 0, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 20s linear infinite; z-index: -1;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        .terminal {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--neon); border-radius: 20px;
            padding: 30px; width: 340px; text-align: center;
            box-shadow: 0 0 40px rgba(124, 252, 0, 0.15);
            position: relative; overflow: hidden;
        }

        .guild-logo { 
            width: 90px; height: 90px; border-radius: 50%; 
            border: 2px solid var(--neon); margin-bottom: 10px;
            box-shadow: 0 0 15px var(--neon); object-fit: cover;
        }

        h1 { font-size: 18px; letter-spacing: 4px; color: var(--neon); text-transform: uppercase; margin: 10px 0; }
        .status-line { font-size: 9px; color: var(--neon); opacity: 0.7; margin-bottom: 15px; font-family: monospace; }

        input {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.7);
            border: 1px solid #333; border-radius: 12px; color: var(--neon);
            text-align: center; font-size: 16px; box-sizing: border-box;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }

        .btn {
            width: 100%; padding: 14px;
            background: var(--accent); border: 1px solid var(--neon);
            color: #fff; font-weight: bold; border-radius: 12px;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
            font-size: 11px; letter-spacing: 1px; box-sizing: border-box;
        }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        
        .btn-secondary { background: transparent; color: var(--neon); }

        .hidden { display: none; }

        .log-stream {
            font-size: 10px; color: #666; text-align: left; 
            background: rgba(0,0,0,0.4); padding: 10px; 
            border-radius: 8px; margin: 15px 0; height: 35px; overflow: hidden;
        }

        .quest-card {
            background: rgba(124, 252, 0, 0.05); border: 1px dashed var(--neon);
            padding: 15px; border-radius: 12px; margin-bottom: 10px;
        }

        .badge { font-size: 9px; background: var(--neon); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="screen-login" class="terminal">
        <img src="logo.png" class="guild-logo">
        <h1>HQ ACCESS</h1>
        <div class="status-line">ID: PRIPYAT-7 // ENCRYPTED</div>
        <input type="password" id="key" placeholder="TOKEN_ID">
        <button class="btn" onclick="auth()">Authorize</button>
    </div>

    <div id="screen-hub" class="terminal hidden">
        <div id="user-rank-tag" class="badge">ROLE: ???</div>
        <h1 id="user-name">NAME</h1>
        
        <div class="log-stream" id="log">
            > Neural link established...<br>
            > Arsenal V3 loaded.
        </div>

        <div id="quest-panel" class="hidden">
            <div class="quest-card">
                <div style="font-size: 9px; color: var(--neon); margin-bottom: 5px;">ACTIVE MISSION:</div>
                <span id="quest-text" style="font-size: 12px;">...</span>
                <button onclick="sendReport()" class="btn" style="height: 35px; margin-top: 10px; padding: 0;">SUBMIT REPORT</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="window.open('https://docs.google.com/document/d/1GpDgRnZjKvQx1rGRyF6lTeoehoV8liSyWFwWz77TUMQ/edit?usp=sharing')">BATTLE ARSENAL</button>
            
            <button class="btn" style="background: #1b5e20;" onclick="window.open('https://misterfisher.by/fish-magnet?page=7')">КУПИТЬ ПРИМАНКИ</button>

            <div id="admin-panel" class="hidden">
                <button class="btn btn-secondary" onclick="alert('Карта секретных свалов обновлена')">S-ZONES MAP</button>
            </div>
        </div>

        <div style="margin-top: 20px; font-size: 9px; color: #444; cursor: pointer;" onclick="location.reload()">>> DISCONNECT</div>
    </div>

    <script>
        const users = {
            'чери-мастер': { name: 'МАГИСТР ДЖИГА', rank: 'MASTER', admin: true },
            'старый-мост': { name: 'ГРОССМЕЙСТЕР ОМУТОВ', rank: 'GRANDMASTER', admin: true },
            'уха-база': { name: 'АДМИРАЛ ТРАПЕЗЫ', rank: 'LOGISTICS', admin: false },
            'малек-дозор': { name: 'БЕРЕГОВОЙ СТРАЖ', rank: 'SENTINEL', admin: false }
        };

        const quests = [
            { t: "Приготовить легендарную уху", r: "EPIC" },
            { t: "Зарядить фонари и повербанк", r: "COMMON" },
            { t: "Инспекция крючков и узлов", r: "RARE" },
            { t: "Сортировка Fish Magnet", r: "COMMON" },
            { t: "Проверить давление в шинах Stels", r: "RARE" },
            { t: "Подготовить 4л воды", r: "COMMON" }
        ];

        let activeQ = "";

        function auth() {
            const k = document.getElementById('key').value.toLowerCase();
            const u = users[k];
            if(u) {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-hub').classList.remove('hidden');
                document.getElementById('user-name').innerText = u.name;
                document.getElementById('user-rank-tag').innerText = "RANK: " + u.rank;
                
                if(u.admin) {
                    document.getElementById('admin-panel').classList.remove('hidden');
                } else {
                    document.getElementById('quest-panel').classList.remove('hidden');
                    const q = quests[Math.floor(Math.random() * quests.length)];
                    activeQ = q.t;
                    document.getElementById('quest-text').innerHTML = `<span style="color:#aaa">[${q.r}]</span> ${q.t}`;
                }
                startLog();
            } else { alert("ACCESS DENIED"); }
        }

        function startLog() {
            const l = document.getElementById('log');
            const lines = ["> Connection secure...", "> Tracking Perch activity...", "> Status: Ready for fishing", "> Welcome, Master"];
            let i = 0;
            setInterval(() => {
                l.innerHTML = "> " + lines[i % lines.length] + "<br>> " + lines[(i+1) % lines.length];
                i++;
            }, 3000);
        }

        function sendReport() {
            const name = document.getElementById('user-name').innerText;
            const sub = "REPORT_" + name;
            const body = `MISSION COMPLETE\nUser: ${name}\nObjective: ${activeQ}`;
            window.location.href = `mailto:danielbandziuk@gmail.com?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
            alert("REPORT SENT.");
        }
    </script>
</body>
</html>
