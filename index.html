<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Припятский Дозор | OS V5</title>
    <style>
        :root { --neon: #7cfc00; --glass: rgba(10, 25, 10, 0.92); --bg: #020502; --accent: #1b5e20; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(rgba(124, 252, 0, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(124, 252, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 20s linear infinite; z-index: -1;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        .terminal {
            background: var(--glass); border: 1px solid var(--neon); border-radius: 25px;
            padding: 25px; width: 92%; max-width: 380px; text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.9), 0 0 15px rgba(124, 252, 0, 0.1);
        }
        .guild-logo { 
            width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--neon);
            margin-bottom: 10px; box-shadow: 0 0 20px var(--neon); object-fit: cover;
        }
        h1 { font-size: 1.1rem; letter-spacing: 4px; color: var(--neon); text-transform: uppercase; margin: 10px 0; }
        .status-line { font-size: 9px; color: var(--neon); opacity: 0.6; margin-bottom: 20px; font-family: monospace; }
        
        input {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.8);
            border: 1px solid #333; border-radius: 15px; color: var(--neon);
            text-align: center; font-size: 18px; margin-bottom: 10px;
        }
        .btn {
            width: 100%; padding: 16px; background: var(--accent); border: 1px solid var(--neon);
            color: #fff; font-weight: bold; border-radius: 15px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; font-size: 11px; letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.95); }
        .btn:hover { background: var(--neon); color: #000; }

        .log-stream {
            font-size: 10px; color: #5a5; text-align: left; background: rgba(0,0,0,0.6);
            padding: 12px; border-radius: 12px; margin: 15px 0; border-left: 2px solid var(--neon);
        }
        .order-box {
            background: rgba(124, 252, 0, 0.05); border: 1px dashed var(--neon);
            padding: 12px; border-radius: 15px; margin-top: 15px; text-align: left;
        }
        .order-title { font-size: 10px; color: var(--neon); font-weight: bold; margin-bottom: 5px; }
        .badge { font-size: 9px; background: var(--neon); color: #000; padding: 3px 10px; border-radius: 20px; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen-login" class="terminal">
        <img src="logo.png" class="guild-logo">
        <h1>PRIPYAT DOZOR</h1>
        <div class="status-line">OS VERSION 5.0 // SECURE LINK</div>
        <input type="password" id="key" placeholder="ВВЕДИТЕ КОД">
        <button class="btn" onclick="auth()">АВТОРИЗАЦИЯ</button>
    </div>

    <div id="screen-hub" class="terminal hidden">
        <div id="user-rank" class="badge">ТИТУЛ</div>
        <h1 id="user-name">ИМЯ</h1>
        <div id="user-role" style="font-size: 12px; color: #aaa; margin-top: -5px;">РОЛЬ</div>
        
        <div class="log-stream" id="log">
            > Инициализация протоколов...<br>
            > Поиск окуня в секторе Припять...
        </div>

        <div class="order-box">
            <div class="order-title">🏆 АКТИВНЫЕ ОРДЕНА:</div>
            <div id="orders-list" style="font-size: 11px; line-height: 1.4;"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
            <button class="btn" onclick="window.open('https://docs.google.com/document/d/1GpDgRnZjKvQx1rGRyF6lTeoehoV8liSyWFwWz77TUMQ/edit?usp=sharing')">БОЕВОЙ АРСЕНАЛ</button>
            <button class="btn" style="background: #0d3b0e;" onclick="window.open('https://misterfisher.by/fish-magnet?page=7')">МАГАЗИН ПРИМАНОК</button>
            <div id="admin-panel" class="hidden">
                <button class="btn" style="background: transparent;" onclick="alert('Координаты секретных свалов обновлены!')">КАРТА S-ЗОН</button>
            </div>
        </div>

        <div style="margin-top: 20px; font-size: 9px; color: #444; cursor: pointer;" onclick="location.reload()">[ ЗАВЕРШИТЬ СЕАНС ]</div>
    </div>

    <script>
        const users = {
            'чери-мастер': { 
                name: 'ЧЕРИ', 
                rank: 'МАГИСТР ДЖИГА', 
                role: 'Главный стратег. Высший доступ.',
                orders: ['⚓ Стальной Трос', '🌲 Первопроходец', '⚡ Мастер Джиг-Рига (в процессе)'],
                admin: true 
            },
            'старый-мост': { 
                name: 'ДЕД', 
                rank: 'ГРОССМЕЙСТЕР ОМУТОВ', 
                role: 'Основатель. Высший доступ.',
                orders: ['🏆 Щучий Усмиритель (в процессе)', '⚓ Стальной Трос', '🌲 Первопроходец', '👨‍⚖️ Хранитель Традиций'],
                admin: true 
            },
            'малек-дозор': { 
                name: 'МАМА', 
                rank: 'БЕРЕГОВОЙ СТРАЖ', 
                role: 'Тыл и связь (Instagram)',
                orders: ['На связи с базой'],
                admin: false 
            },
            'уха-база': { 
                name: 'БАБУШКА', 
                rank: 'АДМИРАЛ ТРАПЕЗЫ', 
                role: 'Хозяйка базы. Базовый доступ.',
                orders: ['Хранительница рецептов'],
                admin: false 
            }
        };

        function auth() {
            const k = document.getElementById('key').value.toLowerCase();
            const u = users[k];
            if(u) {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-hub').classList.remove('hidden');
                document.getElementById('user-name').innerText = u.name;
                document.getElementById('user-rank').innerText = u.rank;
                document.getElementById('user-role').innerText = u.role;
                
                const list = document.getElementById('orders-list');
                list.innerHTML = u.orders.map(o => `• ${o}`).join('<br>');

                if(u.admin) document.getElementById('admin-panel').classList.remove('hidden');
                startLog();
            } else { alert("ОШИБКА ДОСТУПА"); }
        }

        function startLog() {
            const l = document.getElementById('log');
            const lines = ["> Связь со спутником: OK", "> Эхолот: Рыба обнаружена", "> Тест снастей: Выполнен", "> Ждем команду Магистра..."];
            let i = 0;
            setInterval(() => {
                l.innerHTML = "> " + lines[i % lines.length] + "<br>> " + lines[(i+1) % lines.length];
                i++;
            }, 3000);
        }
    </script>
</body>
</html>
