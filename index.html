<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Припятский Дозор | Экономика V5.3</title>
    <style>
        :root { --neon: #7cfc00; --glass: rgba(10, 25, 10, 0.92); --bg: #020502; --accent: #1b5e20; --gold: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
        }
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(rgba(124, 252, 0, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(124, 252, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 20s linear infinite; z-index: -1;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        .terminal {
            background: var(--glass); border: 1px solid var(--neon); border-radius: 25px;
            padding: 25px; width: 92%; max-width: 380px; text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.9), 0 0 15px rgba(124, 252, 0, 0.1);
        }
        .guild-logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--neon); margin-bottom: 10px; box-shadow: 0 0 20px var(--neon); object-fit: cover; }
        
        .wallet {
            background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold);
            padding: 10px; border-radius: 15px; margin: 10px 0; color: var(--gold);
            font-weight: bold; font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        .btn {
            width: 100%; padding: 16px; background: var(--accent); border: 1px solid var(--neon);
            color: #fff; font-weight: bold; border-radius: 15px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; font-size: 11px; letter-spacing: 1px; margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.95); }
        .btn:hover { background: var(--neon); color: #000; }

        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--glass); margin: 20% auto; padding: 20px; border: 1px solid var(--neon); border-radius: 20px; width: 85%; max-width: 320px; }

        .quest-item { background: rgba(124, 252, 0, 0.1); padding: 15px; border-radius: 15px; margin: 10px 0; font-size: 13px; text-align: left; }
        .hidden { display: none; }
        .badge { font-size: 9px; background: var(--neon); color: #000; padding: 3px 10px; border-radius: 20px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="screen-login" class="terminal">
        <img src="logo.png" class="guild-logo">
        <h1>ПРИПЯТСКИЙ ДОЗОР</h1>
        <div style="font-size: 9px; color: var(--neon); opacity: 0.6; margin-bottom: 20px;">BANKING SYSTEM V5.3</div>
        <input type="password" id="key" style="width: 100%; padding: 15px; background: #000; border: 1px solid #333; border-radius: 15px; color: var(--neon); text-align: center; margin-bottom: 10px;" placeholder="КОД ДОСТУПА">
        <button class="btn" onclick="auth()">ВОЙТИ</button>
    </div>

    <div id="screen-hub" class="terminal hidden">
        <div id="user-rank" class="badge">ТИТУЛ</div>
        <h1 id="user-name" style="margin: 5px 0 0 0;">ИМЯ</h1>
        
        <div class="wallet">
            🪙 БАЛАНС: <span id="balance">0</span> РЫБИКОВ
        </div>

        <button class="btn" style="background: #4a148c; border-color: #9c27b0;" onclick="showQuests()">⚔️ АКТИВНЫЕ КВЕСТЫ</button>
        <button class="btn" onclick="window.open('https://docs.google.com/document/d/1GpDgRnZjKvQx1rGRyF6lTeoehoV8liSyWFwWz77TUMQ/edit?usp=sharing')">АРСЕНАЛ ГИЛЬДИИ</button>
        
        <div style="margin-top: 20px; font-size: 9px; color: #444; cursor: pointer;" onclick="location.reload()">[ ВЫХОД ]</div>
    </div>

    <div id="questModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--neon); font-size: 16px; margin-top: 0;">СПИСОК ЗАДАЧ</h2>
            <div class="quest-item">
                <b>ОСНОВНОЙ:</b> Вылов рыбы весом 1 кг<br>
                <span style="color: var(--gold); font-size: 11px;">Награда: 5 Рыбиков</span>
                <button class="btn" style="margin-top: 10px; padding: 10px; background: #ffd700; color: #000; border: none;" onclick="completeQuest(5)">СДАТЬ КВЕСТ</button>
            </div>
            <button class="btn" style="background: transparent;" onclick="closeQuests()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const users = {
            'чери-мастер': { name: 'ЧЕРИ', rank: 'МАГИСТР ДЖИГА' },
            'старый-мост': { name: 'ДЕД', rank: 'ГРОССМЕЙСТЕР ОМУТОВ' },
            'малек-дозор': { name: 'МАМА', rank: 'БЕРЕГОВОЙ СТРАЖ' },
            'уха-база': { name: 'БАБУШКА', rank: 'АДМИРАЛ ТРАПЕЗЫ' }
        };

        let currentBalance = 0;

        function auth() {
            const k = document.getElementById('key').value.toLowerCase();
            const u = users[k];
            if(u) {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-hub').classList.remove('hidden');
                document.getElementById('user-name').innerText = u.name;
                document.getElementById('user-rank').innerText = u.rank;
                
                // Загружаем баланс из памяти браузера
                currentBalance = parseInt(localStorage.getItem('rybik_' + k)) || 0;
                updateBalanceDisplay();
            } else { alert("ОТКАЗАНО"); }
        }

        function completeQuest(amount) {
            const k = document.getElementById('key').value.toLowerCase();
            currentBalance += amount;
            localStorage.setItem('rybik_' + k, currentBalance);
            updateBalanceDisplay();
            alert("Квест сдан! +5 Рыбиков на счет!");
            closeQuests();
        }

        function updateBalanceDisplay() {
            document.getElementById('balance').innerText = currentBalance;
        }

        function showQuests() { document.getElementById('questModal').style.display = "block"; }
        function closeQuests() { document.getElementById('questModal').style.display = "none"; }
    </script>
</body>
</html>
