<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Припятский Дозор | Морской Штаб V5.5</title>
    <style>
        :root { 
            --ocean-blue: #0a4d68; --water: #088395; --foam: #05BFDB; --sand: #f4e4c1;
            --boat: #8b4513; --fish-orange: #ff6b35; --seaweed: #2d6a4f; --gold: #ffd700;
            --pearl: #f8f9fa; --deep-sea: #001524;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: linear-gradient(180deg, #001524 0%, #0a4d68 50%, #088395 100%);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow-x: hidden; position: relative;
        }
        body::before {
            content: ""; position: absolute; width: 100%; height: 200px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M0,60 Q300,100 600,60 T1200,60 L1200,120 L0,120 Z" fill="rgba(8,131,149,0.1)"/></svg>');
            background-size: 1200px 120px; bottom: 0; animation: waves 15s linear infinite; z-index: 0;
        }
        body::after {
            content: "🐟 🐠 🎣 🦈 🐙"; position: absolute; font-size: 30px;
            top: 20%; left: -100px; animation: fishSwim 25s linear infinite; opacity: 0.3; z-index: 0;
        }
        @keyframes waves { from { background-position: 0 0; } to { background-position: 1200px 0; } }
        @keyframes fishSwim { 0% { left: -100px; } 100% { left: 110%; } }
        @keyframes bubbles {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-800px) scale(1); opacity: 0; }
        }
        .bubble {
            position: absolute; bottom: -50px; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(5,191,219,0.3));
            border-radius: 50%; animation: bubbles 8s infinite ease-in; z-index: 0;
        }
        .terminal { 
            background: linear-gradient(135deg, rgba(139, 69, 19, 0.95) 0%, rgba(101, 67, 33, 0.95) 100%);
            border: 3px solid var(--sand); border-radius: 20px; padding: 30px 25px; 
            width: 92%; max-width: 380px; text-align: center; 
            box-shadow: 0 15px 50px rgba(0,21,36,0.6), 0 0 0 10px rgba(139,69,19,0.3);
            position: relative; z-index: 10;
        }
        .terminal::before { content: "⚓"; position: absolute; top: -40px; left: 50%; transform: translateX(-50%); font-size: 35px; }
        h1 { font-size: 1.3rem; letter-spacing: 3px; color: var(--foam); text-transform: uppercase; margin: 10px 0 20px; }
        .treasury {
            background: linear-gradient(135deg, #2d1b00 0%, #4a2c00 50%, #2d1b00 100%);
            border: 3px solid var(--gold); padding: 20px; border-radius: 15px; margin: 20px 0; 
            color: var(--gold); font-weight: bold; font-size: 1.1rem; position: relative;
        }
        .btn {
            width: 100%; padding: 18px; background: linear-gradient(180deg, var(--seaweed) 0%, #1b4d3e 100%);
            border: 2px solid var(--foam); color: #fff; font-weight: bold; border-radius: 12px; cursor: pointer;
            text-transform: uppercase; transition: all 0.3s ease; font-size: 12px; margin-bottom: 12px;
        }
        .btn-gold { background: linear-gradient(180deg, #daa520 0%, #b8860b 100%); border-color: var(--gold); color: #2d1b00; }
        .btn-shop { background: linear-gradient(180deg, #ff8c42 0%, #ff6b35 100%); border-color: #ffa07a; }
        input {
            width: 100%; padding: 16px; background: rgba(0,21,36,0.7); border: 2px solid var(--water); 
            border-radius: 12px; color: var(--foam); text-align: center; margin-bottom: 12px; outline: none;
        }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,21,36,0.95); backdrop-filter: blur(5px); }
        .modal-content { 
            background: linear-gradient(135deg, rgba(139, 69, 19, 0.98) 0%, rgba(101, 67, 33, 0.98) 100%);
            margin: 20% auto; padding: 25px; border: 3px solid var(--sand); border-radius: 20px; width: 85%; max-width: 320px;
        }
        .badge { font-size: 10px; background: var(--fish-orange); color: #fff; padding: 5px 12px; border-radius: 20px; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen-login" class="terminal">
        <h1>ПРИПЯТСКИЙ ДОЗОР</h1>
        <input type="password" id="key" placeholder="ПАРОЛЬ МАГИСТРА">
        <button class="btn" onclick="auth()">ПОГРУЖЕНИЕ</button>
    </div>

    <div id="screen-hub" class="terminal hidden">
        <div id="user-rank" class="badge">ТИТУЛ</div>
        <h1 id="user-name">ИМЯ</h1>
        
        <div class="treasury">
            💰 КАЗНА: <span id="global-balance">0</span> 🪙
        </div>

        <button class="btn btn-gold" onclick="showQuests()">⚔️ АКТИВНЫЕ КВЕСТЫ</button>
        <button class="btn btn-shop" onclick="window.open('https://misterfisher.by/fish-magnet?page=7')">🛒 КУПИТЬ ПРИМАНКИ</button>
        <button class="btn" onclick="window.open('https://docs.google.com/document/d/1GpDgRnZjKvQx1rGRyF6lTeoehoV8liSyWFwWz77TUMQ/edit?usp=sharing')">📋 АРСЕНАЛ</button>
        
        <div id="admin-tools" class="hidden">
            <button class="btn" style="background:transparent; border:1px dashed var(--sand); color:var(--sand); font-size:10px;" onclick="adjustBalance()">АДМИН: КОРРЕКЦИЯ КАЗНЫ</button>
        </div>

        <div style="margin-top:20px; font-size:10px; color:var(--sand); cursor:pointer; opacity:0.6;" onclick="location.reload()">[ ВСПЛЫТЬ / ВЫХОД ]</div>
    </div>

    <div id="questModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--foam); font-size:18px;">ЗАДАНИЕ ДНЯ</h2>
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; text-align:left; font-size:13px; border:1px solid var(--sand);">
                <b>ЦЕЛЬ:</b> Вылов рыбы весом 1 кг<br>
                <b>НАГРАДА:</b> +5 Рыбиков в казну
                <button class="btn" style="margin-top:15px; background:var(--gold); color:#000;" onclick="addRybiki(5)">СДАТЬ УЛОВ</button>
            </div>
            <button class="btn" style="background:transparent; margin-top:10px; border:none;" onclick="closeQuests()">НАЗАД</button>
        </div>
    </div>

    <script>
        const users = {
            'чери-мастер': { name: 'ЧЕРИ', rank: 'МАГИСТР ДЖИГА', admin: true },
            'старый-мост': { name: 'ДЕД', rank: 'ГРОССМЕЙСТЕР ОМУТОВ', admin: true },
            'малек-дозор': { name: 'МАМА', rank: 'БЕРЕГОВОЙ СТРАЖ', admin: false },
            'уха-база': { name: 'БАБУШКА', rank: 'АДМИРАЛ ТРАПЕЗЫ', admin: false }
        };

        function auth() {
            const k = document.getElementById('key').value.toLowerCase();
            const u = users[k];
            if(u) {
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-hub').classList.remove('hidden');
                document.getElementById('user-name').innerText = u.name;
                document.getElementById('user-rank').innerText = u.rank;
                if(u.admin) document.getElementById('admin-tools').classList.remove('hidden');
                createBubbles(); // Запуск пузырьков
                updateDisplay();
            } else { alert("ПАРОЛЬ НЕВЕРНЫЙ"); }
        }

        function createBubbles() {
            for(let i = 0; i < 15; i++) {
                let b = document.createElement('div');
                b.className = 'bubble';
                let s = Math.random() * 30 + 10;
                b.style.width = s + 'px'; b.style.height = s + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(b);
            }
        }

        function addRybiki(n) {
            let b = parseInt(localStorage.getItem('guild_treasury')) || 0;
            localStorage.setItem('guild_treasury', b + n);
            updateDisplay();
            alert("Рыба взвешена! Казна пополнена!");
            closeQuests();
        }

        function adjustBalance() {
            let v = prompt("Установить баланс казны:");
            if(v !== null) { localStorage.setItem('guild_treasury', v); updateDisplay(); }
        }

        function updateDisplay() {
            document.getElementById('global-balance').innerText = localStorage.getItem('guild_treasury') || 0;
        }

        function showQuests() { document.getElementById('questModal').style.display = "block"; }
        function closeQuests() { document.getElementById('questModal').style.display = "none"; }
    </script>
</body>
</html>
